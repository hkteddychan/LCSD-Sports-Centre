<!DOCTYPE html>
<html lang="zh-HK">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>LCSD Sports Centres | 康文署體育館</title>
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
 <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  #header {
   background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
   color: white; padding: 12px 20px;
   display: flex; justify-content: space-between; align-items: center;
   flex-wrap: wrap; gap: 10px;
  }
  #header h1 { font-size: 18px; font-weight: 600; }

  #lang-toggle { display: flex; gap: 8px; }
  #lang-toggle button {
   padding: 6px 14px; border: 1.5px solid rgba(255,255,255,0.5);
   background: transparent; color: white; border-radius: 20px;
   cursor: pointer; font-size: 13px; transition: all 0.2s;
  }
  #lang-toggle button.active { background: white; color: #1a237e; border-color: white; font-weight: 600; }
  #lang-toggle button:hover:not(.active) { border-color: white; }

  #sport-bar {
   padding: 8px 15px;
   background: #f8f9ff;
   border-bottom: 1px solid #e0e4ff;
   display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .sport-btn {
   padding: 5px 14px; border: 1.5px solid #c5cae9;
   background: white; color: #3949ab; border-radius: 16px;
   cursor: pointer; font-size: 12px; font-weight: 600;
   transition: all 0.2s;
  }
  .sport-btn:hover { background: #e8eaf6; }
  .sport-btn.active {
   background: #3949ab; color: white; border-color: #3949ab;
  }

  #date-bar {
   padding: 8px 15px;
   background: #f5f5f5;
   border-bottom: 1px solid #ddd;
   display: flex; gap: 5px; overflow-x: auto; align-items: center;
   white-space: nowrap;
  }
  .date-btn {
   padding: 5px 12px; border: 1.5px solid #ccc;
   background: white; color: #555; border-radius: 16px;
   cursor: pointer; font-size: 11.5px; font-weight: 600;
   transition: all 0.2s; flex-shrink: 0;
  }
  .date-btn:hover { border-color: #3949ab; color: #3949ab; }
  .date-btn.active { background: #3949ab; color: white; border-color: #3949ab; }
  .date-btn .date-num {
   display: block; font-size: 14px; margin-top: 1px;
  }

  #controls {
   padding: 8px 15px; background: #fafafa;
   display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
   border-bottom: 1px solid #ddd;
  }
  #controls label { font-size: 13px; color: #555; }
  #district-filter {
   padding: 5px 10px; border: 1px solid #ccc; border-radius: 6px;
   font-size: 13px; min-width: 150px;
  }
  #search-input {
   padding: 5px 10px; border: 1px solid #ccc; border-radius: 6px;
   font-size: 13px; width: 180px;
  }
  #time-filter {
   padding: 5px 10px; border: 1px solid #ccc; border-radius: 6px;
   font-size: 13px; min-width: 110px;
  }
  #stats { font-size: 12px; color: #666; margin-left: auto; }

  #map { height: calc(100vh - 155px); width: 100%; }

  .leaflet-popup-content-wrapper {
   border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
  .popup-content { min-width: 320px; max-width: 380px; }
  .popup-header {
   font-size: 15px; font-weight: 700; color: #1a237e;
   margin-bottom: 6px; padding-bottom: 6px; border-bottom: 2px solid #3949ab;
  }
  .popup-sub {
   font-size: 11.5px; color: #777; margin-top: -4px; margin-bottom: 6px;
  }
  .popup-row {
   display: flex; gap: 6px; margin: 3px 0;
   font-size: 12.5px; line-height: 1.4;
  }
  .popup-label { font-weight: 600; color: #555; min-width: 60px; }
  .popup-value { color: #333; flex: 1; }

  /* Schedule Grid */
  .popup-schedule {
   margin-top: 10px; padding: 10px;
   background: #f8f9ff; border-radius: 10px;
   border: 1px solid #dde4ff;
  }
  .popup-schedule-header {
   font-size: 11px; font-weight: 700; color: #33691e;
   margin-bottom: 6px; display: flex; justify-content: space-between;
  }
  .popup-schedule-venue {
   font-size: 11px; color: #666; margin-bottom: 8px;
  }
  .time-grid {
   display: grid;
   grid-template-columns: repeat(4, 1fr);
   gap: 4px;
  }
  .time-cell {
   padding: 5px 3px; border-radius: 6px;
   text-align: center; font-size: 10px; font-weight: 600;
   transition: transform 0.15s;
  }
  .time-cell:hover { transform: scale(1.05); }
  .time-cell .time-label {
   font-size: 9px; opacity: 0.75; font-weight: 400;
  }
  .time-cell .time-courts {
   font-size: 13px; font-weight: 700;
  }
  .time-cell.none { background: #ffebee; color: #c62828; }
  .time-cell.low  { background: #fff9c4; color: #f57f17; }
  .time-cell.mid  { background: #dcedc8; color: #558b2f; }
  .time-cell.high { background: #c8e6c9; color: #2e7d32; }
  .time-cell.full { background: #a5d6a7; color: #1b5e20; }
  /* Highlight time period filter */
  .time-cell.filtered-out { opacity: 0.2; }

  .popup-facilities { margin-top: 8px; }
  .popup-facilities .facility-tags {
   display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px;
  }
  .facility-tag {
   background: #e8eaf6; color: #3949ab; padding: 1px 7px;
   border-radius: 10px; font-size: 10px;
  }
  .popup-link { margin-top: 8px; text-align: right; }
  .popup-link a {
   color: #3949ab; text-decoration: none; font-size: 12px; font-weight: 600;
  }
  .popup-link a:hover { text-decoration: underline; }
  .no-data-msg {
   text-align: center; color: #999; font-size: 12px; padding: 12px;
  }

  .custom-marker {
   border-radius: 50%;
   box-shadow: 0 2px 8px rgba(0,0,0,0.3);
   transition: transform 0.2s;
   display: flex; align-items: center; justify-content: center;
   font-weight: 700; color: white;
  }
  .custom-marker:hover { transform: scale(1.2); }
  .custom-marker.avail {
   background: #3949ab; border: 2.5px solid white;
  }
  .custom-marker.avail-low {
   background: #f57f17; border: 2.5px solid white;
  }
  .marker-text {
   font-size: 10px; line-height: 1;
   text-align: center;
  }

  @media (max-width: 600px) {
   #header h1 { font-size: 15px; }
   #search-input { width: 140px; }
   #map { height: calc(100vh - 170px); }
   .time-grid { grid-template-columns: repeat(4, 1fr); }
  }
 </style>
</head>
<body>
 <div id="header">
  <h1 id="title">LCSD Sports Centres | 康文署體育館</h1>
  <div id="lang-toggle">
   <button class="active" data-lang="en">EN</button>
   <button data-lang="tc">繁體</button>
  </div>
 </div>

 <!-- Sport Type Selector -->
 <div id="sport-bar">
  <span style="font-size:11px;color:#888;font-weight:600;margin-right:4px;">球類:</span>
  <button class="sport-btn active" data-sport="badminton">🏸 羽毛球</button>
  <button class="sport-btn" data-sport="basketball">🏀 籃球</button>
  <button class="sport-btn" data-sport="volleyball">🏐 排球</button>
 </div>

 <!-- Date Tabs -->
 <div id="date-bar">
  <!-- Dynamically generated -->
 </div>

 <div id="controls">
  <label id="district-label">District:</label>
  <select id="district-filter"><option value="">All Districts | 所有地區</option></select>
  <label id="search-label">Search:</label>
  <input type="text" id="search-input" placeholder="Name | 名稱">
  <label id="time-label">Time:</label>
  <select id="time-filter">
   <option value="all" data-en="All Times" data-tc="全部時段">All Times | 全部時段</option>
   <option value="morning" data-en="Morning ≤12:00" data-tc="早 ≤12:00">Morning ≤12:00 | 早 ≤12:00</option>
   <option value="afternoon" data-en="Afternoon 12-17" data-tc="午 12-17">Afternoon 12-17 | 午 12-17</option>
   <option value="evening" data-en="Evening ≥20:00" data-tc="晚 ≥20:00">Evening ≥20:00 | 晚 ≥20:00</option>
  </select>
  <span id="stats">Loading...</span>
 </div>
 <div id="map"></div>

<script>
let currentLang = 'en';
let currentSport = 'badminton';
let currentDateIdx = 0; // index into ALL_DATES
let currentTimeFilter = 'all'; // 'all' | 'morning' | 'afternoon' | 'evening'

const ALL_DATES = [
  { iso: '2026-04-28', label_en: 'Tue 28', label_tc: '二 28' },
  { iso: '2026-04-29', label_en: 'Wed 29', label_tc: '三 29' },
  { iso: '2026-04-30', label_en: 'Thu 30', label_tc: '四 30' },
  { iso: '2026-05-01', label_en: 'Fri 1',  label_tc: '五 1'  },
  { iso: '2026-05-02', label_en: 'Sat 2',  label_tc: '六 2'  },
  { iso: '2026-05-03', label_en: 'Sun 3',  label_tc: '日 3'  },
  { iso: '2026-05-04', label_en: 'Mon 4',  label_tc: '一 4'  },
  { iso: '2026-05-05', label_en: 'Tue 5',  label_tc: '二 5'  },
];

// Time slot labels
const TIME_SLOTS = ['07:00','08:00','09:00','10:00','11:00','12:00',
                    '13:00','14:00','15:00','16:00','17:00','18:00',
                    '19:00','20:00','21:00','22:00'];

// Which slots belong to which time period
const TIME_PERIOD_SLOTS = {
 morning:   ['07:00','08:00','09:00','10:00','11:00','12:00'],
 afternoon: ['12:00','13:00','14:00','15:00','16:00','17:00'],
 evening:   ['20:00','21:00','22:00'],
};

const labels = {
 en: {
  title: 'LCSD Sports Centres',
  district: 'District', search: 'Search', all: 'All Districts',
  address: 'Address', facilities: 'Facilities', hours: 'Hours',
  tel: 'Tel', website: 'Website',
  loading: 'Loading...',
  results: 'Showing {n} venues',
  courts: 'courts',
  noSchedule: 'No schedule data for this venue',
  available: 'Available',
  noAvail: 'No slots',
  sessions: 'sessions',
 },
 tc: {
  title: '康文署體育館',
  district: '地區', search: '搜尋', all: '所有地區',
  address: '地址', facilities: '設施', hours: '開放時間',
  tel: '電話', website: '網站',
  loading: '載入中...',
  results: '顯示 {n} 個場地',
  courts: '個場',
  noSchedule: '此場地暫無數據',
  available: '有位',
  noAvail: '無位',
  sessions: '節',
 }
};

const DISTRICT_NAMES = {
 'CENTRAL AND WESTERN': { en: 'Central & Western', tc: '中西區' },
 'EASTERN':             { en: 'Eastern',             tc: '東區' },
 'ISLANDS':             { en: 'Islands',             tc: '離島' },
 'KOWLOON CITY':        { en: 'Kloon City',          tc: '九龍城' },
 'KWAI TSING':          { en: 'Kwai Tsing',          tc: '葵青' },
 'KWUN TONG':           { en: 'Kwun Tong',           tc: '觀塘' },
 'NORTH':               { en: 'North',               tc: '北區' },
 'SAI KUNG':            { en: 'Sai Kung',            tc: '西貢' },
 'SHA TIN':             { en: 'Sha Tin',             tc: '沙田' },
 'SHAM SHUI PO':        { en: 'Sham Shui Po',        tc: '深水埗' },
 'SOUTHERN':            { en: 'Southern',            tc: '南區' },
 'TAI PO':              { en: 'Tai Po',              tc: '大埔' },
 'TSEUNG KWAN O':       { en: 'Tseung Kwan O',       tc: '將軍澳' },
 'TSUEN WAN':           { en: 'Tsuen Wan',           tc: '荃灣' },
 'TUEN MUN':            { en: 'Tuen Mun',            tc: '屯門' },
 'WAN CHAI':            { en: 'Wan Chai',            tc: '灣仔' },
 'WONG TAI SIN':        { en: 'Wong Tai Sin',        tc: '黃大仙' },
 'YAU TSIM MONG':       { en: 'Yau Tsim Mong',       tc: '油尖旺' },
 'YUEN LONG':           { en: 'Yuen Long',           tc: '元朗' },
};

// Sport-specific data keys
const SPORT_DATA_KEY = {
 badminton:  'BwfSchedule',
 basketball: 'BskSchedule',
 volleyball: 'VlbSchedule',
};

const SPORT_DISPLAY = {
 badminton:  { en: 'Badminton Court', tc: '羽毛球場', unit: { en: 'courts', tc: '個場' },  icon: '🏸' },
 basketball: { en: 'Basketball Court', tc: '籃球場',  unit: { en: 'courts', tc: '個場' },  icon: '🏀' },
 volleyball: { en: 'Volleyball Court', tc: '排球場', unit: { en: 'courts', tc: '個場' },  icon: '🏐' },
};

function getText(enVal, tcVal) {
 if (currentLang === 'en') return enVal || tcVal || '-';
 if (currentLang === 'tc') return tcVal || enVal || '-';
 return enVal && tcVal ? `${enVal} / ${tcVal}` : (enVal || tcVal || '-');
}

function getDistrictName(en, tc) {
 const key = en?.toUpperCase() || '';
 if (DISTRICT_NAMES[key]) {
  if (currentLang === 'en') return DISTRICT_NAMES[key].en;
  if (currentLang === 'tc') return DISTRICT_NAMES[key].tc;
  return `${DISTRICT_NAMES[key].en} / ${DISTRICT_NAMES[key].tc}`;
 }
 return getText(en, tc);
}

function formatFacilities(facilityStr) {
 if (!facilityStr) return [];
 return facilityStr.split(',').map(f => f.trim()).filter(f => f);
}

// Get available sessions count — respects current time period filter
function getAvailableSessions(props) {
 const dataKey = SPORT_DATA_KEY[currentSport];
 const raw = props[dataKey];
 if (!raw) return 0;
 let schedule;
 try { schedule = JSON.parse(raw); } catch(e) { return 0; }
 const dateIso = ALL_DATES[currentDateIdx].iso;
 const dateData = schedule && schedule[dateIso];
 if (!dateData) return 0;

 let total = 0;
 let slotsToCheck = TIME_SLOTS;
 if (currentTimeFilter !== 'all') {
  slotsToCheck = TIME_PERIOD_SLOTS[currentTimeFilter] || TIME_SLOTS;
 }
 slotsToCheck.forEach(t => {
  const c = dateData[t];
  if (c !== undefined && c > 0) total += c;
 });
 return total;
}

function createMarkerIcon(count) {
 const text = count > 0 ? count : '–';
 let cls = 'avail-low';
 if (count >= 7) cls = 'avail';
 // 0 count venues are hidden, not shown
 const sz = count > 99 ? 32 : count > 9 ? 28 : 24;
 return L.divIcon({
  className: 'custom-marker-wrapper',
  html: `<div class="custom-marker ${cls}" style="width:${sz}px;height:${sz}px"><div class="marker-text">${text}</div></div>`,
  iconSize: [sz, sz], iconAnchor: [sz/2, sz/2], popupAnchor: [0, -sz/2]
 });
}

function getCellClass(courts) {
 if (courts <= 0) return 'none';
 if (courts === 1) return 'low';
 if (courts <= 3) return 'mid';
 if (courts <= 6) return 'high';
 return 'full';
}

function buildScheduleGrid(schedule, dateIso) {
 const l = labels[currentLang];
 const sport = SPORT_DISPLAY[currentSport];
 const dateData = schedule && schedule[dateIso];
 if (!dateData) return `<div class="no-data-msg">${l.noSchedule}</div>`;

 // Determine which cells to grey out based on time filter
 const filteredSlots = currentTimeFilter !== 'all'
  ? new Set(TIME_PERIOD_SLOTS[currentTimeFilter] || [])
  : new Set();

 let html = `<div class="time-grid">`;
 TIME_SLOTS.forEach(time => {
  const courts = dateData[time] !== undefined ? dateData[time] : -1;
  const cls = courts < 0 ? 'none' : getCellClass(courts);
  const displayCourts = courts < 0 ? '-' : courts;
  const timeLabel = currentLang === 'tc' ? time.slice(0,2) + ':' : time;
  const filteredOut = filteredSlots.size > 0 && !filteredSlots.has(time) ? ' filtered-out' : '';
  html += `<div class="time-cell ${cls}${filteredOut}">`;
  html += `<div class="time-label">${timeLabel}</div>`;
  html += `<div class="time-courts">${displayCourts}</div>`;
  html += `</div>`;
 });
 html += `</div>`;
 return html;
}

function createPopup(props) {
 const l = labels[currentLang];
 const name = getText(props.NameEN, props.NameTC);
 const address = getText(props.AddressEN, props.AddressTC);
 const district = getDistrictName(props.DistrictEN, props.DistrictTC);

 let facilities = formatFacilities(
  currentLang === 'tc' ? props.FacilityTypeTC : props.FacilityTypeEN
 );

 const hours = getText(props.OpeningHoursEN, props.OpeningHoursTC);
 const tel = props.TelephoneEN || props.TelephoneTC || '-';
 const website = currentLang === 'en' ? props.WebsiteEN : props.WebsiteTC;

 const selectedDate = ALL_DATES[currentDateIdx];
 const dateLabel = currentLang === 'en' ? selectedDate.label_en : selectedDate.label_tc;
 const sportUnit = SPORT_DISPLAY[currentSport].unit[currentLang];

 let html = `<div class="popup-content">`;
 html += `<div class="popup-header">${name}</div>`;
 html += `<div class="popup-sub">${district} · ${dateLabel}</div>`;
 html += `<div class="popup-row"><span class="popup-label">${l.address}:</span><span class="popup-value">${address}</span></div>`;
 if (hours && hours !== '-') html += `<div class="popup-row"><span class="popup-label">${l.hours}:</span><span class="popup-value">${hours}</span></div>`;
 if (tel && tel !== '-') html += `<div class="popup-row"><span class="popup-label">${l.tel}:</span><span class="popup-value">${tel}</span></div>`;

 const dataKey = SPORT_DATA_KEY[currentSport];
 const rawSchedule = props[dataKey];
 let schedule = null;
 if (rawSchedule) {
  try { schedule = JSON.parse(rawSchedule); } catch(e) {}
 }

 html += `<div class="popup-schedule">`;
 html += `<div class="popup-schedule-header">`;
 html += `${labels[currentLang].available} · ${dateLabel} · ${sportUnit}`;
 html += `</div>`;
 if (schedule) {
  html += buildScheduleGrid(schedule, selectedDate.iso);
 } else {
  html += `<div class="no-data-msg">${l.noSchedule}</div>`;
 }
 html += `</div>`;

 if (facilities.length > 0) {
  html += `<div class="popup-facilities"><div class="popup-label">${l.facilities}:</div>`;
  html += `<div class="facility-tags">`;
  facilities.forEach(f => { html += `<span class="facility-tag">${f}</span>`; });
  html += `</div></div>`;
 }

 if (website && website.indexOf('sportcentre.html') === -1) {
  html += `<div class="popup-link"><a href="${website}" target="_blank">${l.website} →</a></div>`;
 }

 html += `</div>`;
 return html;
}

function updateLanguage(newLang) {
 currentLang = newLang;
 const l = labels[newLang];
 document.getElementById('title').textContent =
  newLang === 'en' ? 'LCSD Sports Centres | 康文署體育館' :
  newLang === 'tc' ? '康文署體育館' : 'LCSD Sports Centres / 康文署體育館';
 document.getElementById('district-label').textContent = l.district + ':';
 document.getElementById('search-label').textContent = l.search + ':';
 document.getElementById('time-label').textContent = l.district.indexOf('地') === -1 ? 'Time:' : '時間:';
 document.getElementById('search-input').placeholder =
  newLang === 'en' ? 'Name | 名稱' : newLang === 'tc' ? '名稱' : 'Name / 名稱';

 // Update time filter options
 document.querySelectorAll('#time-filter option').forEach(opt => {
  opt.textContent = newLang === 'tc' ? opt.dataset.tc : opt.en;
 });

 // Rebuild date bar
 buildDateBar();

 const select = document.getElementById('district-filter');
 const cur = select.value;
 select.innerHTML = `<option value="">${l.all}</option>`;
 const districts = new Set();
 if (window.allData) {
  window.allData.forEach(f => {
   const k = f.properties.DistrictEN?.toUpperCase() || '';
   if (k && !districts.has(k)) {
    districts.add(k);
    select.innerHTML += `<option value="${k}">${getDistrictName(f.properties.DistrictEN, f.properties.DistrictTC)}</option>`;
   }
  });
 }
 select.value = cur;

 if (window.markerMap) {
  window.markerMap.forEach((m, idx) => {
   m.setPopupContent(createPopup(window.allData[idx].properties));
   const avail = getAvailableSessions(window.allData[idx].properties);
   m.setIcon(createMarkerIcon(avail));
  });
 }
 updateStats();
 updateMarkerVisibility();
}

function buildDateBar() {
 const bar = document.getElementById('date-bar');
 const today = new Date();
 today.setHours(0,0,0,0);

 bar.innerHTML = '';
 ALL_DATES.forEach((d, idx) => {
  const dateObj = new Date(d.iso + 'T00:00:00');
  const diff = Math.round((dateObj - today) / 86400000);
  let label;
  if (diff === 0) label = currentLang === 'tc' ? '今日' : 'Today';
  else if (diff === 1) label = currentLang === 'tc' ? '明日' : 'Tomorrow';
  else label = currentLang === 'tc' ? d.label_tc : d.label_en;

  const btn = document.createElement('button');
  btn.className = 'date-btn' + (idx === currentDateIdx ? ' active' : '');
  btn.innerHTML = `<span class="date-dow">${label}</span><span class="date-num">${d.iso.slice(5)}</span>`;
  btn.onclick = () => selectDate(idx);
  bar.appendChild(btn);
 });
}

function selectDate(idx) {
 currentDateIdx = idx;
 document.querySelectorAll('.date-btn').forEach((b, i) => {
  b.classList.toggle('active', i === idx);
 });
 if (window.markerMap) {
  window.markerMap.forEach((m, i) => {
   m.setPopupContent(createPopup(window.allData[i].properties));
   const avail = getAvailableSessions(window.allData[i].properties);
   m.setIcon(createMarkerIcon(avail));
  });
 }
 updateMarkerVisibility();
}

function selectSport(sport) {
 currentSport = sport;
 document.querySelectorAll('.sport-btn').forEach(b => {
  b.classList.toggle('active', b.dataset.sport === sport);
 });
 if (window.markerMap) {
  window.markerMap.forEach((m, i) => {
   m.setPopupContent(createPopup(window.allData[i].properties));
   const avail = getAvailableSessions(window.allData[i].properties);
   m.setIcon(createMarkerIcon(avail));
  });
 }
 updateMarkerVisibility();
}

// Show/hide markers: only venues with >0 available sessions shown
function updateMarkerVisibility() {
 const district = document.getElementById('district-filter').value;
 const search = document.getElementById('search-input').value.toLowerCase().trim();

 window.allData.forEach((f, idx) => {
  const avail = getAvailableSessions(f.properties);
  const p = f.properties;
  const dMatch = !district || (p.DistrictEN?.toUpperCase() === district);
  const sMatch = !search ||
   (p.NameEN && p.NameEN.toLowerCase().includes(search)) ||
   (p.NameTC && p.NameTC.includes(search)) ||
   (p.AddressEN && p.AddressEN.toLowerCase().includes(search)) ||
   (p.AddressTC && p.AddressTC.includes(search));
  const m = window.markerMap.get(idx);
  // Only show if has availability AND matches filters
  if (avail > 0 && dMatch && sMatch) {
   m.addTo(map);
  } else {
   m.remove();
  }
 });
}

function updateStats() {
 const l = labels[currentLang];
 let visible = 0;
 window.markerMap.forEach((m) => {
  if (map.hasLayer(m)) visible++;
 });
 document.getElementById('stats').textContent = l.results.replace('{n}', visible);
}

function filterData() {
 updateMarkerVisibility();
 updateStats();
}

const map = L.map('map').setView([22.35, 114.18], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> | LCSD'
}).addTo(map);

window.markerMap = new Map();
window.allData = [];

fetch('lcsd_sports_centres.geojson')
 .then(r => r.json())
 .then(data => {
  window.allData = data.features;

  buildDateBar();

  const districts = new Set();
  data.features.forEach((feature, idx) => {
   const props = feature.properties;
   const dKey = props.DistrictEN?.toUpperCase() || '';
   if (dKey && !districts.has(dKey)) {
    districts.add(dKey);
    document.getElementById('district-filter').innerHTML +=
     `<option value="${dKey}">${getDistrictName(props.DistrictEN, props.DistrictTC)}</option>`;
   }
   const avail = getAvailableSessions(props);
   const m = L.marker(
    [feature.geometry.coordinates[1], feature.geometry.coordinates[0]],
    { icon: createMarkerIcon(avail) }
   ).bindPopup(createPopup(props));
   window.markerMap.set(idx, m);
   // Only add to map if has availability
   if (avail > 0) m.addTo(map);
  });

  updateStats();
 })
 .catch(e => {
  console.error(e);
  document.getElementById('stats').textContent = 'Error loading data';
 });

document.getElementById('district-filter').addEventListener('change', filterData);
document.getElementById('search-input').addEventListener('input', filterData);
document.getElementById('time-filter').addEventListener('change', e => {
 currentTimeFilter = e.target.value;
 if (window.markerMap) {
  window.markerMap.forEach((m, i) => {
   m.setPopupContent(createPopup(window.allData[i].properties));
   const avail = getAvailableSessions(window.allData[i].properties);
   m.setIcon(createMarkerIcon(avail));
  });
 }
 updateMarkerVisibility();
});

document.getElementById('lang-toggle').addEventListener('click', e => {
 if (e.target.tagName !== 'BUTTON') return;
 document.querySelectorAll('#lang-toggle button').forEach(b => b.classList.remove('active'));
 e.target.classList.add('active');
 updateLanguage(e.target.dataset.lang);
});

document.getElementById('sport-bar').addEventListener('click', e => {
 const btn = e.target.closest('.sport-btn');
 if (!btn || btn.disabled) return;
 selectSport(btn.dataset.sport);
});
</script>
</body>
</html>
