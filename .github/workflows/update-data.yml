name: Update LCSD Venue Data

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest venue data from CSDI Geoportal
        run: python3 scripts/fetch_venue_data.py

      - name: Check for changes
        id: changed
        run: |
          if git diff --stat | grep -q lcsd_sports_centres.geojson; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "changes_detected=yes" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "changes_detected=no" >> $GITHUB_OUTPUT
          fi

      - name: Update README last-updated badge
        if: steps.changed.outputs.changed == 'true'
        run: |
          python3 scripts/update_readme_date.py

      - name: Commit and push changes
        if: steps.changed.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMIT_MESSAGE: 'chore: auto-update LCSD venue data'
        run: |
          git config --local user.email "$GIT_AUTHOR_EMAIL"
          git config --local user.name "$GIT_AUTHOR_NAME"
          git add lcsd_sports_centres.geojson README.md
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "$GIT_COMMIT_MESSAGE"
          git push
